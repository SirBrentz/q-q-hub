<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help Center — Quidget WooCommerce Plugin</title>
  <meta name="description" content="Quidget help center. Setup guides, settings, troubleshooting, and FAQ.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@0,400;0,500;0,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="stylesheet" href="../assets/css/quidget.css">
  <style>
    /* Hero */
    .hc-hero{padding:130px 0 80px;background:#4F3574;text-align:center}
    .hc-hero h1{color:#fff;font-size:clamp(2rem,4vw,2.8rem);margin-bottom:12px}
    .hc-hero p{color:rgba(255,255,255,.45);font-size:1rem;margin:0 auto 32px;max-width:400px}
    .hc-search{max-width:520px;margin:0 auto;position:relative}
    .hc-search input{width:100%;padding:16px 24px 16px 52px;border-radius:14px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:#fff;font-family:var(--font-b);font-size:16px;outline:none;transition:all .25s}
    .hc-search input::placeholder{color:rgba(255,255,255,.25)}
    .hc-search input:focus{border-color:var(--indigo);background:rgba(255,255,255,.08);box-shadow:0 0 0 4px rgba(79,53,116,.12)}
    .hc-search svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.25);width:20px;height:20px}

    /* Layout */
    .hc-body{max-width:880px;margin:0 auto;padding:0 var(--gutter)}

    /* Category cards */
    .hc-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:56px 0 0}
    .hc-card{background:var(--white);border:1.5px solid var(--border-lt);border-radius:16px;padding:32px 28px;cursor:pointer;transition:all .25s var(--ease);position:relative;overflow:hidden}
    .hc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--indigo);transform:scaleX(0);transition:transform .25s var(--ease)}
    .hc-card:hover{border-color:var(--indigo);box-shadow:0 8px 32px rgba(79,53,116,.08);transform:translateY(-4px)}
    .hc-card:hover::before{transform:scaleX(1)}
    .hc-card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
    .hc-card-icon svg{width:24px;height:24px}
    .hc-card-icon--setup{background:rgba(79,53,116,.06);color:var(--indigo)}
    .hc-card-icon--settings{background:rgba(5,150,105,.06);color:var(--emerald)}
    .hc-card-icon--trouble{background:rgba(217,119,6,.06);color:var(--amber)}
    .hc-card-icon--faq{background:rgba(37,99,235,.06);color:#2563eb}
    .hc-card h3{font-size:17px;margin-bottom:6px}
    .hc-card p{font-size:13px;color:var(--text-lt);margin:0 0 14px;line-height:1.5}
    .hc-card-count{font-family:var(--font-h);font-size:12px;color:var(--text-lt);font-weight:500}

    /* Article list view */
    .hc-crumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-lt);padding:48px 0 24px}
    .hc-crumb a{color:var(--indigo);font-weight:500;cursor:pointer;text-decoration:none}
    .hc-crumb a:hover{text-decoration:underline}
    .hc-view-title{font-size:1.5rem;margin-bottom:6px}
    .hc-view-desc{font-size:14px;color:var(--text-lt);margin-bottom:28px}
    .hc-articles{border:1.5px solid var(--border-lt);border-radius:14px;overflow:hidden}
    .hc-art-link{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border-lt);cursor:pointer;transition:background .15s;text-decoration:none;color:var(--navy);font-family:var(--font-h);font-size:14px;font-weight:600}
    .hc-art-link:last-child{border-bottom:none}
    .hc-art-link:hover{background:var(--surface);color:var(--indigo)}
    .hc-art-link svg{width:16px;height:16px;color:var(--text-lt);flex-shrink:0;transition:transform .15s}
    .hc-art-link:hover svg{transform:translateX(3px);color:var(--indigo)}

    /* Article detail */
    .hc-art-title{font-size:1.3rem;margin-bottom:20px}
    .hc-art-body{font-size:15px;color:var(--text-mid);line-height:1.8}
    .hc-art-body code{font-size:13px;background:var(--surface-alt);padding:3px 8px;border-radius:5px;font-family:'SF Mono',Monaco,Consolas,monospace}
    .hc-art-body strong{color:var(--navy)}
    .hc-art-body a{color:var(--indigo);font-weight:500}
    .hc-fix{padding:12px 0 12px 16px;border-left:2.5px solid var(--amber-bg);margin:12px 0}
    .hc-fix strong{display:block;font-size:14px;color:var(--amber);margin-bottom:2px}
    .hc-fix span{font-size:14px;color:var(--text-mid);line-height:1.6}
    .hc-art-nav{display:flex;justify-content:space-between;margin-top:36px;padding-top:24px;border-top:1px solid var(--border-lt)}
    .hc-art-nav a{font-family:var(--font-h);font-size:13px;font-weight:600;color:var(--indigo);cursor:pointer;text-decoration:none}
    .hc-art-nav a:hover{text-decoration:underline}

    /* Search */
    .hc-search-tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--indigo);margin-bottom:4px}

    /* Contact */
    .hc-contact{margin:56px 0 80px;padding:28px 32px;background:var(--surface);border:1.5px solid var(--border-lt);border-radius:14px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
    .hc-contact h3{font-size:16px;margin:0 0 4px}
    .hc-contact p{font-size:14px;color:var(--text-mid);margin:0}

    @media(max-width:640px){
      .hc-grid{grid-template-columns:1fr}
      .hc-contact{flex-direction:column;text-align:center}
    }
  </style>
</head>
<body>
<nav class="nav"><div class="nav-inner">
  <a href="../" class="logo"><div class="logo-mark"><svg width="18" height="18" viewBox="0 0 800 800" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><circle cx="420.1" cy="40.1" r="40.1"/><circle cx="207.9" cy="40.1" r="40.1"/><path d="M88.5,189.1l127.6,221.1c17,29.4,45.2,48.9,77.7,54.5v106.6c0,126.1,79.3,228.6,176.8,228.6,97.5,0,176.8-102.6,176.8-228.6v-127c45.3-9.2,79.4-49.3,79.4-97.3,0-54.8-44.5-99.3-99.3-99.3s-99.3,44.5-99.3,99.3c0,48,34.2,88.1,79.4,97.3v127c0,104.2-61.5,188.9-137.1,188.9-75.6,0-137.1-84.7-137.1-188.9v-106.6c32.5-5.7,60.7-25.1,77.7-54.5l127.6-221.1c20.4-35.3,20.4-77.4,0-112.6-20.4-35.3-56.8-56.3-97.5-56.3v39.7c26.3,0,49.9,13.6,63.1,36.4s13.2,50.1,0,72.9l-127.6,221.1c-13.2,22.8-36.8,36.4-63.1,36.4-26.3,0-49.9-13.6-63.1-36.4l-127.6-221.1c-13.2-22.8-13.2-50.1,0-72.9,13.2-22.8,36.8-36.4,63.1-36.4V20.2c-40.7,0-77.2,21-97.5,56.3-20.4,35.3-20.4,77.4,0,112.6Z"/></svg></div>Quidget</a>
  <div class="nav-links">
    <a href="../" class="nav-link">Overview</a>
    <a href="./" class="nav-link nav-link--active">Help Center</a>
    <a href="../changelog/" class="nav-link">Changelog</a>
  </div>
  <div class="nav-actions"><a href="../get-started/" class="btn btn-primary btn-sm">Get Started →</a></div>
  <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
</div></nav>

<section class="hc-hero"><div class="wrap">
  <h1>How can we help?</h1>
  <p>Search or browse topics below.</p>
  <div class="hc-search">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
    <input type="text" id="hcSearch" placeholder="Search for answers..." autocomplete="off">
  </div>
</div></section>

<div class="hc-body" id="hcApp"></div>

<script>
var CHV='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>';
var ICONS={
  setup:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>',
  settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>',
  trouble:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17l-5.36-5.36a2.25 2.25 0 010-3.182l.72-.72a2.25 2.25 0 013.182 0l.72.72.72-.72a2.25 2.25 0 013.182 0l.72.72a2.25 2.25 0 010 3.182l-5.36 5.36a.75.75 0 01-1.06 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 4.5l-1.5 1.5m0 0l-1.5 1.5M18 6l1.5 1.5M18 6l-1.5-1.5M3.75 12h7.5"/></svg>',
  faq:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"/></svg>'
};
var CATS=[
  {id:"setup",icon:"setup",title:"Setup & Installation",desc:"Requirements, installing, and the setup wizard",articles:[
    {q:"System requirements",a:"WordPress 5.0+, WooCommerce 4.0+, PHP 7.2+, SSL certificate (HTTPS), a publicly accessible site, and an active Qualiphy account with API key."},
    {q:"How to install the plugin",a:"In your WordPress admin, go to <strong>Plugins → Add New → Upload Plugin</strong>. Upload the <code>qualiphy.zip</code> file, click <strong>Install Now</strong>, then <strong>Activate</strong>. The setup wizard launches automatically."},
    {q:"What the setup wizard does",a:"Walks you through: accepting terms, verifying requirements (SSL, WooCommerce), uploading your branding, connecting your API key, selecting your service area, importing consultations as WooCommerce products, and configuring settings."},
    {q:"Finding your API key",a:"Log in at <a href='https://app.qualiphy.me' target='_blank'>app.qualiphy.me</a>, click <strong>Settings</strong> in the left sidebar. Your API key is at the top under \"API Key (Default Clinic)\" — click <strong>Copy</strong>. No account? <a href='https://app.qualiphy.me/signup' target='_blank'>Sign up free</a>."},
    {q:"WooCommerce Subscriptions",a:"Only required for recurring monthly consultations (like weight loss refills). One-time consultations and GFE exams work without it."},
    {q:"Payment gateway",a:"Required for paid consultations. Stripe, PayPal, or similar must be active in <strong>WooCommerce → Settings → Payments</strong>. Free consultations work without a gateway."},
  ]},
  {id:"settings",icon:"settings",title:"Settings & Configuration",desc:"General, checkout, pricing, branding, and more",articles:[
    {q:"Auto Send & Auto Launch",a:"<strong>Auto Send</strong> (default: on) sends exam invites on checkout. <strong>Auto Launch</strong> (default: on) shows the exam modal on the thank-you page. Disable either for manual control."},
    {q:"Popup vs Redirect mode",a:"<strong>Popup</strong> shows a modal with meeting link, QR code, and dismiss option. <strong>Redirect</strong> counts down then sends patient to meeting URL. Configure under <code>Qualiphy → Settings → General</code>."},
    {q:"Auto Refund & Return Fee",a:"Deferred consultations auto-refund order total minus return fee (default $30). Overridable per product. Per-item fees summed across Qualiphy line items."},
    {q:"Default Price Margin",a:"Auto-fills patient-facing price during import. Default 10% — if Qualiphy cost is $28, patient price fills to $30.80."},
    {q:"Checkout fields",a:"Gender, Date of Birth, and Phone added automatically when a Qualiphy product is in the cart. Guest checkout disabled. Age: Rx requires 18+, GFE requires 13+."},
    {q:"Service area",a:"48 states + D.C. (Alabama and Mississippi excluded). Configure under <code>Qualiphy → Settings → Service Area</code>."},
    {q:"Branding",a:"Upload light/dark logos and accent colors under <code>Qualiphy → Settings → Branding</code>. Appears on exam launch modal and patient emails."},
    {q:"Language & text",a:"All patient-facing text is editable: buttons, modals, questionnaires, disclaimers. Under <code>Qualiphy → Settings → Language</code>."},
    {q:"Clinical Access",a:"Only users with clinical access can view patient order details. Setup admin gets access automatically. Manage in Settings."},
    {q:"Email notifications",a:"Admin emails for invite failures with error details. Patient emails are automatic. Under <code>Qualiphy → Settings → Emails</code>."},
  ]},
  {id:"trouble",icon:"trouble",title:"Troubleshooting",desc:"Common issues and how to fix them",articles:[
    {q:"Exam invite not sending",a:"<div class='hc-fix'><strong>No payment gateway</strong><span>Invites fire on payment confirmation. Check WooCommerce → Settings → Payments.</span></div><div class='hc-fix'><strong>Caching</strong><span>Exclude /checkout/ and /my-account/ from cache.</span></div><div class='hc-fix'><strong>Free exam</strong><span>Must use \"Free Instant Checkout\" during import.</span></div>"},
    {q:"\"Please log in\" error",a:"<div class='hc-fix'><strong>Account creation disabled</strong><span>WooCommerce → Settings → Accounts → enable account creation during checkout.</span></div><div class='hc-fix'><strong>Cache</strong><span>Clear entire site cache after installing.</span></div>"},
    {q:"Popup not appearing",a:"<div class='hc-fix'><strong>Auto-launch disabled</strong><span>Enable Auto Launch in Qualiphy → Settings.</span></div><div class='hc-fix'><strong>Missing URL</strong><span>Check order's Qualiphy section for error details.</span></div>"},
    {q:"\"Not available in your area\"",a:"<div class='hc-fix'><strong>Service area</strong><span>Check states in Qualiphy → Settings → Service Area.</span></div><div class='hc-fix'><strong>Shipping zone</strong><span>Re-save to regenerate the zone.</span></div>"},
    {q:"Prescription not created",a:"<div class='hc-fix'><strong>Pharmacy routing</strong><span>Verify pharmacy for patient's state under Qualiphy → Pharmacies.</span></div><div class='hc-fix'><strong>Blocked webhook</strong><span>Check if security plugin blocks POST requests.</span></div>"},
    {q:"WP 6.7+ notice",a:"Known issue, fixed in v1.1.0. Update the plugin. Cosmetic only."},
  ]},
  {id:"faq",icon:"faq",title:"Common Questions",desc:"Frequently asked questions about the plugin",articles:[
    {q:"Why can't patients skip checkout?",a:"Checkout collects required patient data. The plugin auto-redirects and creates accounts. For staff: <code>yoursite.com/checkout/?add-to-cart=PRODUCT_ID</code>"},
    {q:"Can I rename products?",a:"Yes. The link is metadata, not tied to the title."},
    {q:"State coverage",a:"48 states + D.C. Alabama and Mississippi excluded."},
    {q:"Multiple consultations in one cart?",a:"One Rx per cart. Multiple GFE exams allowed."},
    {q:"How subscriptions work",a:"Requires WooCommerce Subscriptions. Auto-sends new exam invites on renewal."},
    {q:"Resetting the plugin",a:"Plugins → Uninstall → reactivate. Returns to wizard. Account data unaffected."},
    {q:"Sandbox vs Live",a:"<strong>Sandbox</strong> simulates without charges — use for testing. <strong>Live</strong> processes real exams. Switch after a test order."},
  ]},
];
var ALL=[];CATS.forEach(function(c,ci){c.articles.forEach(function(a,ai){ALL.push({cat:c.title,ci:ci,ai:ai,q:a.q,a:a.a,s:(a.q+' '+a.a).toLowerCase().replace(/<[^>]+>/g,'')})})});
var app=document.getElementById('hcApp');

function goHome(){
  app.innerHTML='<div class="hc-grid">'+CATS.map(function(c,i){
    return '<div class="hc-card" data-i="'+i+'"><div class="hc-card-icon hc-card-icon--'+c.icon+'">'+ICONS[c.icon]+'</div><h3>'+c.title+'</h3><p>'+c.desc+'</p><div class="hc-card-count">'+c.articles.length+' articles '+CHV+'</div></div>'
  }).join('')+'</div><div class="hc-contact"><div><h3>Still need help?</h3><p>support@qualiphy.me · 7 days a week, 6AM–7PM PST</p></div><div style="display:flex;gap:8px;flex-wrap:wrap"><a href="mailto:support@qualiphy.me" class="btn btn-primary btn-sm">Email Support</a><a href="https://calendly.com/caitlin-qualiphy/30min" target="_blank" rel="noopener" class="btn btn-secondary btn-sm">Book a Call</a></div></div>';
  app.querySelectorAll('.hc-card').forEach(function(c){c.addEventListener('click',function(){goCat(+c.dataset.i)})});
  window.scrollTo({top:0,behavior:'smooth'});
}

function goCat(ci){
  var c=CATS[ci];
  app.innerHTML='<div class="hc-crumb"><a onclick="goHome()">Help Center</a><span>›</span><span>'+c.title+'</span></div><h2 class="hc-view-title">'+c.title+'</h2><div class="hc-view-desc">'+c.desc+'</div><div class="hc-articles">'+c.articles.map(function(a,ai){
    return '<a class="hc-art-link" data-ci="'+ci+'" data-ai="'+ai+'"><span>'+a.q+'</span>'+CHV+'</a>'
  }).join('')+'</div><div class="hc-contact"><div><h3>Still need help?</h3><p>support@qualiphy.me · 7 days a week, 6AM–7PM PST</p></div><div style="display:flex;gap:8px;flex-wrap:wrap"><a href="mailto:support@qualiphy.me" class="btn btn-primary btn-sm">Email Support</a><a href="https://calendly.com/caitlin-qualiphy/30min" target="_blank" rel="noopener" class="btn btn-secondary btn-sm">Book a Call</a></div></div>';
  app.querySelectorAll('.hc-art-link').forEach(function(l){l.addEventListener('click',function(){goArt(+l.dataset.ci,+l.dataset.ai)})});
  window.scrollTo({top:0,behavior:'smooth'});
}

function goArt(ci,ai){
  var c=CATS[ci],a=c.articles[ai],prev=ai>0?c.articles[ai-1]:null,next=ai<c.articles.length-1?c.articles[ai+1]:null;
  app.innerHTML='<div class="hc-crumb"><a onclick="goHome()">Help Center</a><span>›</span><a onclick="goCat('+ci+')">'+c.title+'</a><span>›</span><span>'+a.q+'</span></div><h2 class="hc-art-title">'+a.q+'</h2><div class="hc-art-body">'+a.a+'</div><div class="hc-art-nav">'+(prev?'<a onclick="goArt('+ci+','+(ai-1)+')">← '+prev.q+'</a>':'<span></span>')+(next?'<a onclick="goArt('+ci+','+(ai+1)+')">'+next.q+' →</a>':'<span></span>')+'</div>';
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('hcSearch').addEventListener('input',function(){
  var q=this.value.toLowerCase().trim();
  if(!q){goHome();return}
  var r=ALL.filter(function(a){return a.s.indexOf(q)!==-1});
  app.innerHTML='<div class="hc-crumb"><a onclick="goHome();document.getElementById(\'hcSearch\').value=\'\'">Help Center</a><span>›</span><span>Search</span></div><h2 class="hc-view-title">'+(r.length?r.length+' result'+(r.length>1?'s':''):'No results')+'</h2>'+(r.length?'<div class="hc-articles">'+r.map(function(a){return '<a class="hc-art-link" data-ci="'+a.ci+'" data-ai="'+a.ai+'"><div><div class="hc-search-tag">'+a.cat+'</div><span>'+a.q+'</span></div>'+CHV+'</a>'}).join('')+'</div>':'<p style="color:var(--text-lt);padding:20px 0">Try different keywords or <a href="mailto:support@qualiphy.me" style="color:var(--indigo)">contact support</a>.</p>');
  app.querySelectorAll('.hc-art-link').forEach(function(l){l.addEventListener('click',function(){goArt(+l.dataset.ci,+l.dataset.ai)})});
});

goHome();
</script>
<script src="../assets/js/main.js" defer></script>
</body>
</html>
